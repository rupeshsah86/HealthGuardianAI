<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to HealthGuardian — Emergency Healthcare AI Platform">
  <title>Login — HealthGuardian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo" aria-label="HealthGuardian Home">
        <div class="logo-icon" aria-hidden="true"><i class="fas fa-heartbeat"></i></div>
        <span class="logo-text">HealthGuardian</span>
      </a>

      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
            <input
              type="email"
              id="loginEmail"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon" aria-hidden="true"></i>
            <input
              type="password"
              id="loginPassword"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <i class="fas fa-eye toggle-password" role="button" tabindex="0" aria-label="Toggle password visibility"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginSubmit">
          <i class="fas fa-right-to-bracket" aria-hidden="true"></i>
          <span>Sign In</span>
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { bindLoginForm, bindPasswordToggles } from '../js/auth/auth.js';
    import StorageService from '../js/storage/storage.service.js';
    import AppConfig from '../js/config/app.config.js';

    document.addEventListener('DOMContentLoaded', () => {
      bindLoginForm();
      bindPasswordToggles();
    });
  </script>
</body>
</html>
